<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوقات الصلاة - بورصة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #e94560; margin-bottom: 20px; }
        .prayer-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #0f3460;
        }
        .prayer-row:last-child { border-bottom: none; }
        .time { font-weight: bold; color: #00d2ff; }
        .date { font-size: 0.9em; color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="city-name">أوقات الصلاة</h2>
    <div class="date" id="current-date">جاري التحميل...</div>
    
    <div id="prayers-list">
        </div>
</div>

<script>
    async function getPrayerTimes() {
        try {
            // نستخدم مدينة Bursa كمثال بما أنها مدينتك
            const response = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Bursa&country=Turkey&method=13');
            const data = await response.json();
            const timings = data.data.timings;
            const date = data.data.date.readable;

            document.getElementById('current-date').innerText = date;
            
            const prayers = {
                "الفجر": timings.Fajr,
                "الشروق": timings.Sunrise,
                "الظهر": timings.Dhuhr,
                "العصر": timings.Asr,
                "المغرب": timings.Maghrib,
                "العشاء": timings.Isha
            };

            let html = '';
            for (const [name, time] of Object.entries(prayers)) {
                html += `
                    <div class="prayer-row">
                        <span>${name}</span>
                        <span class="time">${time}</span>
                    </div>
                `;
            }
            document.getElementById('prayers-list').innerHTML = html;
        } catch (error) {
            document.getElementById('prayers-list').innerHTML = "حدث خطأ في جلب البيانات.";
        }
    }

    getPrayerTimes();
</script>

</body>
</html>
