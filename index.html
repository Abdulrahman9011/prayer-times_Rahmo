<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: transparent; /* لجعل الخلفية شفافة تماماً */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
        }
        .widget-card {
            background: rgba(255, 255, 255, 0.1); /* تأثير زجاجي */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #next-prayer { font-size: 0.9rem; color: #ffbc00; margin-bottom: 5px; }
        #countdown { font-size: 2rem; font-weight: bold; color: #00d2ff; margin-bottom: 15px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        .prayer-item span { display: block; opacity: 0.8; }
        .active { color: #ffbc00; font-weight: bold; }
    </style>
</head>
<body>

<div class="widget-card">
    <div id="next-prayer">جاري التحميل...</div>
    <div id="countdown">00:00</div>
    <div class="grid" id="all-prayers">
        </div>
</div>

<script>
    async function getTimes() {
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Bursa&country=Turkey&method=13');
            const json = await res.json();
            const t = json.data.timings;
            const now = new Date();
            
            const list = [
                {n: "الفجر", h: t.Fajr}, {n: "الظهر", h: t.Dhuhr}, 
                {n: "العصر", h: t.Asr}, {n: "المغرب", h: t.Maghrib}, 
                {n: "العشاء", h: t.Isha}
            ];

            let next = null;
            let html = '';
            
            list.forEach(p => {
                const pTime = new Date(now.toDateString() + ' ' + p.h);
                let cls = '';
                if (!next && pTime > now) {
                    next = {name: p.n, time: pTime};
                    cls = 'active';
                }
                html += `<div class="prayer-item ${cls}"><span>${p.n}</span>${p.h}</div>`;
            });

            if (!next) next = {name: "الفجر", time: new Date(now.getTime() + 86400000)};

            document.getElementById('all-prayers').innerHTML = html;
            document.getElementById('next-prayer').innerText = `باقي لـ ${next.name}`;
            
            const diff = next.time - now;
            const hrs = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            document.getElementById('countdown').innerText = `${hrs}س و ${mins}د`;
            
        } catch(e) { document.getElementById('countdown').innerText = "خطأ!"; }
    }
    getTimes();
    setInterval(getTimes, 60000);
</script>
</body>
</html>
