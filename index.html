<div id="next-prayer-timer" style="font-size: 1.2em; color: #ffbc00; margin-bottom: 15px; font-weight: bold;">
    جاري حساب الوقت للصلاة القادمة...
</div>
<div id="prayers-list"></div>

<script>
    async function updateTimes() {
        const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Bursa&country=Turkey&method=13');
        const data = await res.json();
        const timings = data.data.timings;
        
        // منطق العد التنازلي
        const now = new Date();
        let nextPrayer = null;
        const prayerNames = {"Fajr":"الفجر", "Dhuhr":"الظهر", "Asr":"العصر", "Maghrib":"المغرب", "Isha":"العشاء"};
        
        for (let [id, name] of Object.entries(prayerNames)) {
            const pTime = new Date(now.toDateString() + ' ' + timings[id]);
            if (pTime > now) {
                nextPrayer = {name, time: pTime};
                break;
            }
        }

        if (nextPrayer) {
            const diff = Math.floor((nextPrayer.time - now) / 60000);
            const hours = Math.floor(diff / 60);
            const mins = diff % 60;
            document.getElementById('next-prayer-timer').innerText = `باقي لـ ${nextPrayer.name}: ${hours} ساعة و ${mins} دقيقة`;
        }
    }
    updateTimes();
</script>
